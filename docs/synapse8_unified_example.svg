       0.707 × 200 = 141
       8축 (시계방향, 위=0):
         0 top      (360, 190)
         1 TR       (501, 249)
         2 right    (560, 390)
         3 BR       (501, 531)
         4 bottom   (360, 590)
         5 BL       (219, 531)
         6 left     (160, 390)
         7 TL       (219, 249)
  ══════════════════════════════════════════ -->

  <!-- Grid rings 20/40/60/80/100% -->
  <!-- r=40 -->
  <polygon points="360,350 388,362 400,390 388,418 360,430 332,418 320,390 332,362"
