      .subtitle   { font: 400 12px 'Apple SD Gothic Neo', sans-serif; fill: #64748b; }
      .axis-lbl   { font: 700 13px 'Apple SD Gothic Neo', sans-serif; }
      .axis-sub   { font: 400 10px 'Apple SD Gothic Neo', sans-serif; fill: #94a3b8; }
      .type-badge { font: 700 9px 'Apple SD Gothic Neo', sans-serif; }
      .score-cur  { font: 700 11px 'Apple SD Gothic Neo', sans-serif; fill: #2563eb; }
      .score-ideal{ font: 700 11px 'Apple SD Gothic Neo', sans-serif; fill: #dc2626; }
      .pct        { font: 400 9px 'Apple SD Gothic Neo', sans-serif; fill: #cbd5e1; }
      .legend-t   { font: 700 11px 'Apple SD Gothic Neo', sans-serif; fill: #334155; }
      .legend-s   { font: 400 10px 'Apple SD Gothic Neo', sans-serif; fill: #64748b; }
      .meta-title { font: 700 12px 'Apple SD Gothic Neo', sans-serif; fill: #1e293b; }
      .meta-val   { font: 800 14px 'Apple SD Gothic Neo', sans-serif; }
      .meta-lbl   { font: 400 10px 'Apple SD Gothic Neo', sans-serif; fill: #64748b; }
      .person-tag { font: 600 11px 'Apple SD Gothic Neo', sans-serif; fill: #475569; }
      .gap-lbl    { font: 700 10px 'Apple SD Gothic Neo', sans-serif; }
    </style>

    <!-- 현재 그라디언트 -->
    <radialGradient id="curGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.06"/>
    </radialGradient>
    <!-- 이상향 그라디언트 -->
    <radialGradient id="idealGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.02"/>
    </radialGradient>
  </defs>

  <!-- ── 배경 ── -->
  <rect width="720" height="860" fill="#f8fafc" rx="20"/>
  <rect x="16" y="16" width="688" height="828" fill="white" rx="14" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ── 헤더 ── -->
