  <line x1="360" y1="390" x2="560" y2="390" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="360" y1="390" x2="501" y2="531" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="360" y1="390" x2="360" y2="590" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
