  <text x="367" y="313" class="pct">40</text>
  <text x="367" y="273" class="pct">60</text>
  <text x="367" y="233" class="pct">80</text>

  <!-- ══ 현재 프로필 (파란 실선) ══
    점수: 지적호기심=72, 자기계발=65, 사회시선=35, 깊이몰입=45,
          정서↔도전=30, 실용↔성찰=80, 소비↔창조=25, 개인↔세계=45
    r = score/100 * 200

    0 top(72%):    r=144 → (360, 390-144) = (360, 246)
    1 TR(65%):     r=130 → 0.707*130=92 → (452, 298)
    2 right(35%):  r=70  → (430, 390)
    3 BR(45%):     r=90  → 0.707*90=64 → (424, 454)
    4 bottom(30%): r=60  → (360, 450)
    5 BL(80%):     r=160 → 0.707*160=113 → (247, 503)
    6 left(25%):   r=50  → (310, 390)
    7 TL(45%):     r=90  → 0.707*90=64 → (296, 326)
  -->
  <polygon
    points="360,246 452,298 430,390 424,454 360,450 247,503 310,390 296,326"
    fill="url(#curGrad)"
    stroke="#3b82f6"
    stroke-width="2.5"
    stroke-linejoin="round"/>

  <!-- ══ 이상향 (빨간 점선, ADJACENT) ══
    점수: 지적호기심=87, 자기계발=85, 사회시선=55, 깊이몰입=65,
          정서↔도전=45, 실용↔성찰=65, 소비↔창조=45, 개인↔세계=50

    0 top(87%):    r=174 → (360, 216)
    1 TR(85%):     r=170 → 0.707*170=120 → (480, 270)
    2 right(55%):  r=110 → (470, 390)
    3 BR(65%):     r=130 → 0.707*130=92 → (452, 482)
    4 bottom(45%): r=90  → (360, 480)
    5 BL(65%):     r=130 → 0.707*130=92 → (268, 482)
    6 left(45%):   r=90  → (270, 390)
    7 TL(50%):     r=100 → 0.707*100=71 → (289, 319)
  -->
  <polygon
    points="360,216 480,270 470,390 452,482 360,480 268,482 270,390 289,319"
    fill="url(#idealGrad)"
    stroke="#ef4444"
    stroke-width="2"
    stroke-dasharray="7,4"
    stroke-linejoin="round"/>

