# ─────────────────────────────────────────────────────────
# Synapse Platform — Nginx (Structure 2: EC2 Backend Only)
# Amplify가 프론트엔드를 서빙하고, Nginx는 백엔드 API 앞단 역할
# ─────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 로그 포맷 ────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── 기본 설정 ────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # ── 보안: 버전 숨기기 ─────────────────────────────────
    server_tokens off;

    # ── Rate Limiting ────────────────────────────────────
    # API 전체: IP당 10req/s (burst 20 허용)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # 인증 엔드포인트: IP당 3req/m (브루트포스 방지)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/m;

    # ── Upstream: FastAPI ─────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS 리다이렉트 (도메인 설정 후 활성화) ───
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }

    # ── 메인 서버 블록 (HTTP, 초기 운영용) ───────────────
    server {
        listen 80;
        server_name _;

        # ── 보안 헤더 ─────────────────────────────────────
        add_header X-Content-Type-Options   "nosniff"         always;
        add_header X-Frame-Options          "DENY"            always;
        add_header X-XSS-Protection         "1; mode=block"   always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

        # ── Health Check (Nginx 자체) ─────────────────────
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── API 프록시 ────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # SSE (Server-Sent Events) 지원 — Navigator 채팅 스트리밍
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;

            # CORS — Amplify 프론트엔드 허용
            add_header Access-Control-Allow-Origin  "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── Health 엔드포인트 (직접 접근) ────────────────
        location = /health {
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass       http://backend/health;
            proxy_set_header Host $host;
        }

        # ── 기타 요청 차단 ────────────────────────────────
        location / {
            return 404;
        }
    }

    # ── HTTPS 서버 블록 (SSL 인증서 발급 후 활성화) ───────
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     # (위 location 블록 동일하게 복사)
    # }
}
