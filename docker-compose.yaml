# ─────────────────────────────────────────────────────────
# Synapse Platform — docker-compose (배포·통합 테스트)
#
# 접속: http://localhost (nginx 단일 진입점)
#   /      → frontend dist
#   /api/  → backend:8000
#
# 로컬 UI 개발: docker-compose.dev.yml + pnpm dev
# ─────────────────────────────────────────────────────────

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: synapse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: synapse
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - synapse-net

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-migrate
    restart: "no"
    entrypoint: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/synapse
    networks:
      - synapse-net
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/synapse
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NAVIGATOR_MODEL: ${NAVIGATOR_MODEL:-gpt-4o}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
    expose:
      - "8000"
    networks:
      - synapse-net
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - synapse-net

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-celery-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/synapse
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    networks:
      - synapse-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-celery-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/synapse
      REDIS_URL: redis://redis:6379/0
    networks:
      - synapse-net
    depends_on:
      - redis
      - celery-worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost}
    image: synapse-frontend-build
    volumes:
      - frontend-dist:/export
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp -a /app/dist/. /export/"]
    restart: "no"
    networks:
      - synapse-net

  nginx:
    image: nginx:1.25-alpine
    container_name: synapse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
      - nginx-logs:/var/log/nginx
    networks:
      - synapse-net
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully

networks:
  synapse-net:
    driver: bridge

volumes:
  pgdata:
  nginx-logs:
  frontend-dist:
