# ─────────────────────────────────────────────────────────
# Synapse Platform — docker-compose
# ─────────────────────────────────────────────────────────

services:

  # ── PostgreSQL + pgvector ─────────────────────────────
  db:
    image: pgvector/pgvector:pg17
    container_name: synapse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: synapse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - synapse-net

  # ── FastAPI 백엔드 ────────────────────────────────────
  backend:
    image: ${DOCKER_HUB_USERNAME}/synapse-backend:${IMAGE_TAG:-latest}
    container_name: synapse-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/synapse
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NAVIGATOR_MODEL=${NAVIGATOR_MODEL:-gpt-4o}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    expose:
      - "8000"
    networks:
      - synapse-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx ─────────────────────────────────────────────
  nginx:
    image: ${DOCKER_HUB_USERNAME}/synapse-nginx:${IMAGE_TAG:-latest}
    container_name: synapse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-logs:/var/log/nginx
    networks:
      - synapse-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  synapse-net:
    driver: bridge

volumes:
  pgdata:
  nginx-logs:
