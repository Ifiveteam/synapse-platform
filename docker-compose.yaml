# ─────────────────────────────────────────────────────────
# Synapse Platform — docker-compose
# ─────────────────────────────────────────────────────────

services:

  # ── PostgreSQL + pgvector ─────────────────────────────
  db:
    image: pgvector/pgvector:pg17
    container_name: synapse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: synapse
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - synapse-net

  # ── FastAPI 백엔드 ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/synapse
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NAVIGATOR_MODEL=${NAVIGATOR_MODEL:-gpt-4o}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
    expose:
      - "8000"
    networks:
      - synapse-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - synapse-net

  # ── Celery Worker ─────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-celery-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/synapse
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    networks:
      - synapse-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Celery Beat (스케줄러) ────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-celery-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/synapse
      - REDIS_URL=redis://redis:6379/0
    networks:
      - synapse-net
    depends_on:
      - redis
      - celery-worker

  # ── Nginx ─────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: synapse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-logs:/var/log/nginx
    networks:
      - synapse-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  synapse-net:
    driver: bridge

volumes:
  pgdata:
  nginx-logs:
