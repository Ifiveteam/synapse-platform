# ─────────────────────────────────────────────────────────
# Synapse Platform — docker-compose (로컬 개발)
#
# 백엔드·DB만 Docker. 프론트는 호스트에서 pnpm dev.
#
#   docker compose -f docker-compose.dev.yml up --build
#   cd frontend && pnpm dev   → http://localhost:5173
#   API                       → http://localhost:8000
#
# frontend/.env:
#   VITE_API_BASE_URL=http://localhost:8000
#
# backend/.env — API 키 등 (DATABASE_URL은 compose가 덮어씀)
# 배포·통합 테스트: docker compose up  (루트 docker-compose.yaml)
# ─────────────────────────────────────────────────────────

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: synapse-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: synapse
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - synapse-dev-net

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-migrate-dev
    restart: "no"
    entrypoint: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/synapse
    networks:
      - synapse-dev-net
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-backend-dev
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/synapse
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NAVIGATOR_MODEL: ${NAVIGATOR_MODEL:-gpt-4o}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
    ports:
      - "8000:8000"
    networks:
      - synapse-dev-net
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  synapse-dev-net:
    driver: bridge

volumes:
  pgdata-dev:
