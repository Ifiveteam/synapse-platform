name: CD — Docker Hub 빌드 & EC2 배포

on:
  push:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Docker 이미지 빌드 & Docker Hub 푸시 ─────────────
  build-and-push:
    name: 빌드 & Docker Hub 푸시
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      # ── Backend ──────────────────────────────────────
      - name: Backend 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/synapse-backend:latest
            ${{ env.DOCKER_HUB_USERNAME }}/synapse-backend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Nginx ────────────────────────────────────────
      - name: Nginx 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/synapse-nginx:latest
            ${{ env.DOCKER_HUB_USERNAME }}/synapse-nginx:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── EC2 배포 ─────────────────────────────────────────
  deploy:
    name: EC2 배포
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout (docker-compose.yaml 전달용)
        uses: actions/checkout@v4

      - name: EC2 SSH 배포
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 환경변수 설정
            export DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            export YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}

            # 작업 디렉토리 이동
            cd ~/synapse-platform

            # 최신 docker-compose.yaml 가져오기
            git pull origin main

            # 이미지 pull & 재시작
            docker compose pull
            docker compose up -d --remove-orphans

            # 오래된 이미지 정리
            docker image prune -f

            echo "✅ 배포 완료: $IMAGE_TAG"
