name: CD — Docker Hub 빌드 & EC2 배포

on:
  push:
    branches: [main]

jobs:
  # ── 이미지 빌드 & Docker Hub 푸시 (시크릿 없이 코드만) ──
  build-and-push:
    name: 빌드 & 푸시
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Backend 이미지 빌드 & 푸시
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/synapse-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/synapse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend 이미지 빌드 & 푸시 (context=루트)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          build-args: |
            VITE_API_BASE_URL=https://ifive.site
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/synapse-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/synapse-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── EC2 배포 (시크릿 런타임 주입) ─────────────────────
  deploy:
    name: EC2 배포
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: EC2 SSH 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/synapse
            git pull origin main

            # ── 런타임 .env 생성 (이미지가 아니라 여기서 주입) ──
            cat > .env <<EOF
            DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}
            IMAGE_TAG=${{ github.sha }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
            NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
            NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
            EOF
            chmod 600 .env

            # 최신 이미지 pull & 재시작
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "✅ 배포 완료: ${{ github.sha }}"
