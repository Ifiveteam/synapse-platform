name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  backend:
    name: Backend 검증 (ruff + import)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 의존성 설치
        run: uv sync --frozen

      - name: ruff 린트
        run: uv run ruff check .

      - name: 임포트 검증
        run: uv run python -c "from app.main import app"

  frontend:
    name: Frontend 빌드 (타입체크)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 빌드 (tsc --noEmit && vite build)
        run: pnpm build
