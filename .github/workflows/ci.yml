name: CI — 테스트 & 빌드 검증

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  # ── 백엔드 테스트 ────────────────────────────────────
  backend-test:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        working-directory: backend
        run: uv sync --frozen --no-dev

      - name: 임포트 검증
        working-directory: backend
        run: uv run python -c "from app.main import app; print('OK')"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  # ── 프론트엔드 빌드 검증 ──────────────────────────────
  frontend-build:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: 빌드
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Docker 빌드 검증 (이미지 push 없이) ───────────────
  docker-build-check:
    name: Docker 빌드 검증
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Backend 이미지 빌드 (push 없음)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend 이미지 빌드 (push 없음)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Nginx 이미지 빌드 (push 없음)
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
